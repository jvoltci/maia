<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <!-- Premium Linear Gradient matching the cyan-to-royal-blue sweep -->
    <linearGradient id="shivya-logo-grad" x1="10%" y1="0%" x2="90%" y2="0%">
      <stop offset="0%" stop-color="#00FFCC" />
      <stop offset="25%" stop-color="#00E5FF" />
      <stop offset="50%" stop-color="#0088FF" />
      <stop offset="75%" stop-color="#2979FF" />
      <stop offset="100%" stop-color="#1A3BFF" />
    </linearGradient>

    <!-- Subtle Drop Shadow Filter for nodes and text -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Solid Dark Background -->
  <rect width="100%" height="100%" fill="#000000" />

  <!-- Main Logo Mark Group -->
  <g transform="translate(0, 40)">
    <!-- 1. The Right Loop Ribbon (Royal Blue Gradient Side) -->
    <path d="M 400,320 C 475,200 625,180 705,240 C 765,285 765,355 705,400 C 625,460 475,440 400,320 C 460,400 590,410 650,370 C 690,340 690,300 650,270 C 590,230 460,240 400,320 Z" 
          fill="url(#shivya-logo-grad)" 
          filter="url(#glow)" />

    <!-- 2. The Left Loop Network (Teal/Cyan Side) -->
    <!-- Network Connections (Lines) -->
    <g stroke="url(#shivya-logo-grad)" stroke-width="4.5" fill="none" opacity="0.95" filter="url(#glow)">
      <!-- Outer Boundary Curves -->
      <path d="M 400,320 C 370,240 300,180 230,180" />
      <path d="M 240,440 C 300,440 370,380 400,320" />
      
      <!-- Outer Straight Boundary Edges -->
      <line x1="230" y1="180" x2="120" y2="260" />
      <line x1="120" y1="260" x2="130" y2="375" />
      <line x1="130" y1="375" x2="240" y2="440" />

      <!-- Center-to-Boundary Spokes -->
      <line x1="255" y1="320" x2="230" y2="180" />
      <line x1="255" y1="320" x2="120" y2="260" />
      <line x1="255" y1="320" x2="130" y2="375" />
      <line x1="255" y1="320" x2="240" y2="440" />

      <!-- Center-to-Crossover Eye/Lens Curve Pair -->
      <path d="M 255,320 C 300,290 350,290 400,320" />
      <path d="M 255,320 C 300,350 350,350 400,320" />
    </g>

    <!-- Network Physical Nodes (Glow Circles) -->
    <g fill="url(#shivya-logo-grad)" filter="url(#glow)">
      <circle cx="230" cy="180" r="11" />
      <circle cx="120" cy="260" r="11" />
      <circle cx="130" cy="375" r="11" />
      <circle cx="240" cy="440" r="11" />
      <circle cx="255" cy="320" r="11" />
      <circle cx="400" cy="320" r="6" fill="#00B0FF" /> <!-- Subtle crossover pin -->
    </g>
  </g>

  <!-- 3. Futuristic Geometric Typography "SHIVYA" -->
  <g stroke="url(#shivya-logo-grad)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)">
    <!-- S -->
    <path d="M 160,540 L 125,540 A 15,15 0 0,0 110,555 L 110,565 A 15,15 0 0,0 125,580 L 145,580 A 15,15 0 0,1 160,595 L 160,605 A 15,15 0 0,1 145,620 L 110,620" />
    
    <!-- H -->
    <path d="M 200,540 L 200,620 M 260,540 L 260,620 M 200,580 L 260,580" />
    
    <!-- I -->
    <path d="M 320,540 L 320,620" />
    
    <!-- V -->
    <path d="M 380,540 L 410,620 L 440,540" />
    
    <!-- Y -->
    <path d="M 480,540 L 510,580 L 540,540 M 510,580 L 510,620" />
    
    <!-- A (Futuristic inverted V / Caret Λ) -->
    <path d="M 580,620 L 610,540 L 640,620" />
  </g>
</svg>
